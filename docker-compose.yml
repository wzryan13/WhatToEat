services:
  # ── 应用：FastAPI 后端 ──────────────────────────────────────
  app:
    build: .
    container_name: whattoeat_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # 容器内用服务名连依赖（覆盖 .env 里的 localhost）
      DATABASE_URL: postgresql://cookhero:cookhero123@postgres:5432/cookhero
      REDIS_HOST: redis
      MILVUS_URI: http://standalone:19530
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      standalone:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  # ── PostgreSQL：长期记忆 ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: whattoeat_postgres
    environment:
      POSTGRES_DB: cookhero
      POSTGRES_USER: cookhero
      POSTGRES_PASSWORD: cookhero123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookhero"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis：缓存 ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: whattoeat_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── Milvus 向量库（etcd + minio + standalone）──────────────
  etcd:
    container_name: whattoeat_milvus_etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: whattoeat_milvus_minio
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: whattoeat_milvus
    image: milvusdb/milvus:v2.5.27
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      MINIO_REGION: us-east-1
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
