services:
  postgres:
    image: postgres:16-alpine
    container_name: cookhero_postgres
    environment:
      POSTGRES_DB: cookhero
      POSTGRES_USER: cookhero
      POSTGRES_PASSWORD: cookhero123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cookhero_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
